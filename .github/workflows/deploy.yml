name: Deploy

on:
  push:
    branches: [main]

# Required for OIDC token request
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: cloudarchive-api
  GITHUB_ACTIONS_ROLE_ARN: arn:aws:iam::722141136946:role/cloudarchive-github-actions
  APP_RUNNER_SERVICE_ARN: arn:aws:apprunner:ap-southeast-2:722141136946:service/cloudarchive-api/d106a80a3dba48039881f76c32c75fde
  # TODO: fill in after `cdk deploy CloudArchiveComputeStack` — copy AmplifyAppId output
  # Run: aws amplify list-apps --query 'apps[?name==`cloudarchive-web`].appId' --output text --profile cloudarchive
  AMPLIFY_APP_ID: "d20hw7pj39tnza"

jobs:
  deploy-api:
    name: Push to ECR & Deploy App Runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            api/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Trigger App Runner deployment
        run: |
          aws apprunner start-deployment \
            --service-arn ${{ env.APP_RUNNER_SERVICE_ARN }}

  deploy-web:
    name: Trigger Amplify Build
    runs-on: ubuntu-latest
    needs: deploy-api   # only runs after API deploy succeeds

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger Amplify deployment
        run: |
          aws amplify start-job \
            --app-id ${{ env.AMPLIFY_APP_ID }} \
            --branch-name main \
            --job-type RELEASE
